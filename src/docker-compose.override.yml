version: '3.8'

services:
  # Database services

  # usersdb: PostgreSQL database for the Users API
  usersdb:
    container_name: usersdb
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=usersDb
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_users:/var/lib/postgresql/18/data

  # productsdb: MySQL database for the Products API
  productsdb:
    container_name: productsdb
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=productsDb
      - MYSQL_USER=appuser
      - MYSQL_PASSWORD=admin
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - mysql_products:/var/lib/mysql
  
  # ordersdb: MongoDB database for the Orders API
  ordersdb:
    container_name: ordersdb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_orders:/data/db
  
  # API services

  # Users API service
  users.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__DefaultConnection=Server=$POSTGRES_HOST;Port=$POSTGRES_PORT;Database=$POSTGRES_DATABASE;User Id=$POSTGRES_USER;Password=$POSTGRES_PASSWORD;Include Error Detail=true;
    depends_on:
      - usersdb 
    ports:
      - "7070:8080"
      - "7777:8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro
  
  # Products API service
  products.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__DefaultConnection=Server=productsdb;Port=3306;Database=productsDb;User Id=appuser;Password=admin;Include Error Detail=true
    depends_on:
      - productsdb
    ports:
      - "7071:8080"
      - "7778:8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro

  # Orders API service
  orders.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__DefaultConnection=mongodb://ordersdb:27017
    depends_on:
      - ordersdb
    ports:
      - "7072:8080"
      - "7779:8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro